<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIM目標達成率儀表板</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-2: #f5f4f0;
    --bg-3: #eeece8;
    --text: #1a1a18;
    --text-2: #6b6a66;
    --text-3: #9b9a96;
    --border: rgba(0,0,0,0.12);
    --border-2: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green: #1D9E75;
    --green-bg: #EAF3DE;
    --green-text: #3B6D11;
    --red: #E24B4A;
    --red-bg: #FCEBEB;
    --red-text: #A32D2D;
    --blue: #378ADD;
    --blue-bg: #E6F1FB;
    --blue-text: #185FA5;
    --amber-bg: #FAEEDA;
    --amber-text: #854F0B;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --bg-2: #252523;
      --bg-3: #2e2e2b;
      --text: #f0efe9;
      --text-2: #a8a7a2;
      --text-3: #6e6d69;
      --border: rgba(255,255,255,0.1);
      --border-2: rgba(255,255,255,0.2);
      --green-bg: #0F3D25;
      --green-text: #9FE1CB;
      --red-bg: #3D1212;
      --red-text: #F09595;
      --blue-bg: #0C2A45;
      --blue-text: #85B7EB;
      --amber-bg: #3A2200;
      --amber-text: #FAC775;
    }
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-3);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  .topbar {
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .topbar-title .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green); }
  .topbar-right { font-size: 12px; color: var(--text-3); }

  .main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

  .connect-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-top: 1.5rem;
    margin-bottom: 0;
  }
  .source-display {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  }
  .source-url {
    flex: 1; min-width: 0;
    font-size: 12px; color: var(--text-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding: 7px 12px;
    background: var(--bg-2);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
  }
  .source-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .connect-panel h2 {
    font-size: 13px; font-weight: 500; color: var(--text-2);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em;
  }
  .connect-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .connect-row input {
    flex: 1; min-width: 240px; font-size: 13px; padding: 8px 12px;
    border: 0.5px solid var(--border-2); border-radius: var(--radius-md);
    background: var(--bg-2); color: var(--text); outline: none;
  }
  .connect-row input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }

  .btn {
    font-size: 13px; padding: 8px 16px; border: 0.5px solid var(--border-2);
    border-radius: var(--radius-md); background: var(--bg); color: var(--text);
    cursor: pointer; white-space: nowrap; transition: background 0.15s;
  }
  .btn:hover { background: var(--bg-2); }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--text); color: var(--bg); border-color: var(--text); }
  .btn-primary:hover { opacity: 0.85; }

  .status-bar {
    margin-top: 10px; font-size: 12px; color: var(--text-3);
    min-height: 18px; display: flex; align-items: center; gap: 6px;
  }
  .status-bar.ok { color: var(--green-text); }
  .status-bar.err { color: var(--red-text); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  .instructions {
    background: var(--blue-bg);
    border: 0.5px solid rgba(55,138,221,0.25);
    border-radius: var(--radius-md);
    padding: 10px 14px; font-size: 12px; color: var(--blue-text);
    margin-top: 10px; line-height: 1.7;
  }

  .filter-bar {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1rem 1.5rem;
    margin-bottom: 1.5rem; display: flex; gap: 12px; align-items: center; flex-wrap: wrap;
  }
  .filter-bar label { font-size: 13px; color: var(--text-2); }
  .filter-label { font-size: 12px; font-weight: 500; color: var(--text-3); margin-right: 4px; }
  .filter-bar input[type="date"] {
    font-size: 13px; padding: 6px 10px; border: 0.5px solid var(--border-2);
    border-radius: var(--radius-md); background: var(--bg-2); color: var(--text); outline: none;
  }
  .filter-bar input[type="date"]:focus { border-color: var(--blue); }

  .metrics {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 12px; margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
  }
  .metric .val { font-size: 28px; font-weight: 500; color: var(--text); line-height: 1; }
  .metric .lbl { font-size: 12px; color: var(--text-2); margin-top: 6px; }
  .metric.accent-green .val { color: var(--green); }
  .metric.accent-red .val { color: var(--red); }
  .metric.accent-blue .val { color: var(--blue); }

  .charts-row {
    display: grid; grid-template-columns: 280px 1fr; gap: 16px; margin-bottom: 1.5rem;
  }
  @media (max-width: 680px) { .charts-row { grid-template-columns: 1fr; } }

  .card {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 1.25rem 1.5rem;
  }
  .card-title {
    font-size: 12px; font-weight: 500; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 1rem;
  }

  .pie-legend { display: flex; gap: 16px; margin-top: 12px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Person bars */
  .person-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .person-row:last-child { margin-bottom: 0; }
  .person-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: var(--blue-bg); color: var(--blue-text);
    font-size: 12px; font-weight: 500;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .person-info { flex: 1; min-width: 0; }
  .person-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; gap: 6px; }
  .person-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .person-name-text { color: var(--text); font-weight: 500; }
  .person-stat { color: var(--text-2); white-space: nowrap; flex-shrink: 0; }
  .bar-bg { height: 7px; background: var(--bg-2); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }

  /* Performance tags */
  .perf-tag {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 500; white-space: nowrap; flex-shrink: 0;
  }
  .perf-excellent { background: var(--green-bg); color: var(--green-text); }
  .perf-care { background: var(--red-bg); color: var(--red-text); }

  /* Toast */
  .toast-container {
    position: fixed; top: 72px; right: 1.5rem; z-index: 999;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    background: var(--bg); border: 0.5px solid var(--border-2);
    border-radius: var(--radius-lg); padding: 12px 16px;
    font-size: 13px; color: var(--text); min-width: 210px;
    opacity: 0; transform: translateX(20px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(0); }
  .toast.toast-care { border-left: 3px solid var(--red); }
  .toast.toast-excellent { border-left: 3px solid var(--green); }
  .toast-name { font-weight: 500; margin-bottom: 2px; }
  .toast-msg { color: var(--text-2); font-size: 12px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    text-align: left; font-size: 11px; font-weight: 500; color: var(--text-3);
    text-transform: uppercase; letter-spacing: 0.05em; padding: 8px 12px;
    border-bottom: 0.5px solid var(--border);
  }
  td {
    padding: 10px 12px; color: var(--text);
    border-bottom: 0.5px solid var(--border); vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--bg-2); }
  .badge {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 999px; font-size: 11px; font-weight: 500; white-space: nowrap;
  }
  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-ng { background: var(--red-bg); color: var(--red-text); }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { text-align: center; color: var(--text-3); font-size: 13px; padding: 3rem 0; }
  .footer { text-align: center; font-size: 12px; color: var(--text-3); padding: 2rem 0 1rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="dot"></div>
    FIM目標達成率儀表板
  </div>
  <div class="topbar-right" id="lastUpdate">尚未載入</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="main">

  <div class="filter-bar">
    <span class="filter-label">截止日期篩選</span>
    <label>從</label>
    <input type="date" id="dateFrom">
    <label>到</label>
    <input type="date" id="dateTo">
    <button class="btn" onclick="applyFilter()">套用篩選</button>
    <button class="btn" onclick="clearFilter()">清除</button>
    <span style="font-size:12px; color:var(--text-3); margin-left:auto;" id="filterInfo"></span>
  </div>

  <div class="metrics">
    <div class="metric">
      <div class="val" id="m-total">—</div><div class="lbl">總任務數</div>
    </div>
    <div class="metric accent-green">
      <div class="val" id="m-done">—</div><div class="lbl">已達成</div>
    </div>
    <div class="metric accent-red">
      <div class="val" id="m-fail">—</div><div class="lbl">未達成</div>
    </div>
    <div class="metric accent-blue">
      <div class="val" id="m-rate">—</div><div class="lbl">整體達成率</div>
    </div>
    <div class="metric">
      <div class="val" id="m-persons">—</div><div class="lbl">負責人數</div>
    </div>
  </div>

  <div class="charts-row">
    <div class="card">
      <div class="card-title">目標達成比例</div>
      <div style="position:relative; height:200px;">
        <canvas id="pieChart" role="img" aria-label="任務達成與未目標達成比例圓餅圖">目標達成比例圖</canvas>
      </div>
      <div class="pie-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#1D9E75"></div>已達成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E24B4A"></div>未達成</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">各負責人達成率</div>
      <div id="personBars"><div class="empty">尚無資料</div></div>
    </div>
  </div>

  <div class="card" style="margin-bottom:1.5rem;">
    <div class="card-title" style="margin-bottom:1rem;">任務明細</div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:34%">項目名稱</th>
            <th style="width:13%">截止日期</th>
            <th style="width:13%">完成日期</th>
            <th style="width:10%">負責人</th>
            <th style="width:12%">提醒狀態</th>
            <th style="width:10%">是否達成</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="6" class="empty">尚無資料</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="connect-panel">
    <h2>資料來源</h2>
    <div class="source-display" id="sourceDisplay">
      <div class="source-url" id="sourceUrlText"></div>
      <div class="source-actions">
        <button class="btn btn-primary" onclick="refreshSheet()">更新</button>
        <button class="btn" onclick="toggleEdit()">變更來源</button>
      </div>
    </div>
    <div class="connect-row" id="editRow" style="display:none;">
      <input type="text" id="sheetUrl" placeholder="貼上新的 Google Sheets 網址...">
      <button class="btn btn-primary" onclick="saveAndLoad()">確認</button>
      <button class="btn" onclick="toggleEdit()">取消</button>
    </div>
    <div class="status-bar" id="status">
      <span class="status-dot"></span><span>載入中...</span>
    </div>
  </div>

  <div class="footer">FIM目標達成率儀表板 · 資料來源：Google Sheets</div>
</div>

<script>
let allData = [];
let filtered = [];
let pieChartInstance = null;

const FIXED_URL = 'https://docs.google.com/spreadsheets/d/1qcMUBI5lDUuuXGuy7jZz9y3xB-mx6Q2qNzHtSjC9uqU/edit?gid=0#gid=0';
let currentUrl = FIXED_URL;

function toggleEdit() {
  const editRow = document.getElementById('editRow');
  const isHidden = editRow.style.display === 'none';
  editRow.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) document.getElementById('sheetUrl').value = currentUrl;
}

function saveAndLoad() {
  const val = document.getElementById('sheetUrl').value.trim();
  if (!val) return;
  currentUrl = val;
  document.getElementById('sourceUrlText').textContent = currentUrl;
  document.getElementById('editRow').style.display = 'none';
  loadSheet(currentUrl);
}

async function refreshSheet() {
  loadSheet(currentUrl);
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status-bar' + (type ? ' ' + type : '');
  el.innerHTML = '<span class="status-dot"></span><span>' + msg + '</span>';
}

function showToasts(persons) {
  const container = document.getElementById('toastContainer');
  container.innerHTML = '';
  const queue = [];
  persons.forEach(p => {
    const rows = filtered.filter(r => r.person === p);
    const done = rows.filter(r => r.achieved && r.achieved.includes('已達成')).length;
    const pct = rows.length > 0 ? Math.round(done / rows.length * 100) : 0;
    if (pct === 100) queue.push({ person: p, pct, type: 'excellent', msg: '👍 很優秀' });
    else if (pct < 75) queue.push({ person: p, pct, type: 'care', msg: '😣 須關愛' });
  });
  if (!queue.length) return;
  let i = 0;
  function next() {
    if (i >= queue.length) return;
    const t = queue[i++];
    const el = document.createElement('div');
    el.className = 'toast toast-' + t.type;
    el.innerHTML = '<div class="toast-name">負責人 ' + t.person + '　' + t.pct + '%</div><div class="toast-msg">' + t.msg + '</div>';
    container.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 3800);
    setTimeout(next, 450);
  }
  next();
}

function parseDate(s) {
  if (!s) return null;
  return new Date(s.replace(/\//g, '-'));
}

async function loadSheet(raw) {
  if (!raw) raw = currentUrl;
  const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) { setStatus('無法解析試算表 ID，請確認網址格式', 'err'); return; }
  const id = m[1];
  const cleanUrl = raw.split('#')[0];
  const gidM = cleanUrl.match(/[?&]gid=(\d+)/);
  const gid = gidM ? gidM[1] : '0';
  const csvUrl = 'https://docs.google.com/spreadsheets/d/' + id + '/export?format=csv&id=' + id + '&gid=' + gid;
  setStatus('正在連線 Google Sheets...', '');
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) { setStatus('試算表資料為空或格式不符', 'err'); return; }
    const headers = rows[0].map(h => h.trim());
    const idx = kw => headers.findIndex(h => h.includes(kw));
    allData = rows.slice(1).filter(r => r.some(c => c.trim())).map(r => ({
      name: r[idx('項目')] || '', deadline: r[idx('截止')] || '',
      reminder: r[idx('提醒')] || '', done: r[idx('完成')] || '',
      achieved: r[idx('達成')] || '', person: r[idx('負責')] || '',
    }));
    filtered = [...allData];
    setStatus('已從 Google Sheets 載入 ' + allData.length + ' 筆資料', 'ok');
    document.getElementById('lastUpdate').textContent = '已同步 · ' + new Date().toLocaleTimeString('zh-TW');
    render();
  } catch(e) {
    setStatus('載入失敗：' + e.message + '。請確認試算表已設為「知道連結者可檢視」', 'err');
  }
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur);
    return cells.map(c => c.trim().replace(/^"|"$/g, ''));
  });
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  filtered = allData.filter(r => {
    const d = parseDate(r.deadline);
    if (!d) return true;
    if (from && d < new Date(from)) return false;
    if (to && d > new Date(to)) return false;
    return true;
  });
  document.getElementById('filterInfo').textContent = (from || to) ? ('篩選後 ' + filtered.length + ' 筆') : '';
  render();
}

function clearFilter() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.getElementById('filterInfo').textContent = '';
  filtered = [...allData];
  render();
}

function render() {
  const total = filtered.length;
  const done = filtered.filter(r => r.achieved && r.achieved.includes('已達成')).length;
  const fail = total - done;
  const rate = total > 0 ? Math.round(done / total * 100) : 0;
  const persons = [...new Set(filtered.map(r => r.person).filter(Boolean))];

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-fail').textContent = fail;
  document.getElementById('m-rate').textContent = rate + '%';
  document.getElementById('m-persons').textContent = persons.length;

  renderPie(done, fail);
  renderBars(persons);
  renderTable();
  showToasts(persons);
}

function renderPie(done, fail) {
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChartInstance) pieChartInstance.destroy();
  pieChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['已達成', '未達成'],
      datasets: [{ data: [done, fail], backgroundColor: ['#1D9E75', '#E24B4A'], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '65%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + '：' + ctx.raw + ' 筆' } }
      }
    }
  });
}

function getBarColor(pct) {
  if (pct === 100) return '#1D9E75';
  if (pct < 75) return '#E24B4A';
  return '#378ADD';
}

function getPerfTag(pct) {
  if (pct === 100) return '<span class="perf-tag perf-excellent">👍 很優秀</span>';
  if (pct < 75)  return '<span class="perf-tag perf-care">😣 須關愛</span>';
  return '';
}

function renderBars(persons) {
  const container = document.getElementById('personBars');
  if (!persons.length) { container.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  container.innerHTML = persons.map(p => {
    const rows = filtered.filter(r => r.person === p);
    const pDone = rows.filter(r => r.achieved && r.achieved.includes('已達成')).length;
    const pct = rows.length > 0 ? Math.round(pDone / rows.length * 100) : 0;
    return `<div class="person-row">
      <div class="person-avatar">${p}</div>
      <div class="person-info">
        <div class="person-meta">
          <div class="person-left">
            <span class="person-name-text">${p}</span>
            ${getPerfTag(pct)}
          </div>
          <span class="person-stat">${pDone}/${rows.length} &nbsp;${pct}%</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%; background:${getBarColor(pct)};"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">沒有符合條件的資料</td></tr>'; return; }
  tbody.innerHTML = filtered.map(r => `
    <tr>
      <td class="truncate" title="${r.name}">${r.name || '—'}</td>
      <td>${r.deadline || '—'}</td>
      <td>${r.done || '—'}</td>
      <td>${r.person || '—'}</td>
      <td>${r.reminder || '—'}</td>
      <td><span class="badge ${r.achieved && r.achieved.includes('已達成') ? 'badge-ok' : 'badge-ng'}">${r.achieved || '—'}</span></td>
    </tr>`).join('');
}

document.getElementById('sourceUrlText').textContent = currentUrl;
loadSheet(currentUrl);
</script>
</body>
