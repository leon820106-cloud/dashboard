<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>傳票目標管理</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --tiffany:     #0ABAB5;
    --tiffany-dk:  #088A86;
    --tiffany-dkk: #065F5C;
    --tiffany-lt:  #C9F0EE;
    --tiffany-bg:  #E8F9F8;
    --bg:          #ffffff;
    --bg-2:        #F2FAFA;
    --bg-3:        #E4F5F5;
    --text:        #1A3332;
    --text-2:      #2E5554;
    --text-3:      #4A7A79;
    --text-muted:  #7AAEAC;
    --border:      rgba(10,186,181,0.18);
    --border-2:    rgba(10,186,181,0.35);
    --radius-md:   8px;
    --radius-lg:   12px;
    --green:       #0ABAB5;
    --green-bg:    #C9F0EE;
    --green-text:  #065F5C;
    --red:         #E05A5A;
    --red-bg:      #FDEAEA;
    --red-text:    #8B1A1A;
    --amber-bg:    #FEF3DC;
    --amber-text:  #7A4F00;
  }

  body {
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    background: var(--bg-3);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Topbar */
  .topbar {
    background: var(--tiffany-dkk);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-title {
    font-size: 15px;
    font-weight: 600;
    color: #ffffff;
    display: flex;
    align-items: center;
    gap: 10px;
    letter-spacing: 0.02em;
  }
  .topbar-title .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--tiffany-lt);
  }
  .topbar-right {
    font-size: 12px;
    color: var(--tiffany-lt);
    opacity: 0.85;
  }

  .main { max-width: 1200px; margin: 0 auto; padding: 2rem 1.5rem; }

  /* Cards */
  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
  }
  .card-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 1rem;
  }

  /* Metrics */
  .metrics {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .metric {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    border-top: 3px solid var(--border-2);
  }
  .metric .val {
    font-size: 30px;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
  }
  .metric .lbl {
    font-size: 12px;
    color: var(--text-3);
    margin-top: 6px;
    font-weight: 500;
  }
  .metric.accent-green { border-top-color: var(--tiffany); }
  .metric.accent-green .val { color: var(--tiffany-dkk); }
  .metric.accent-red { border-top-color: var(--red); }
  .metric.accent-red .val { color: var(--red); }
  .metric.accent-blue { border-top-color: var(--tiffany-dk); }
  .metric.accent-blue .val { color: var(--tiffany-dk); }

  /* Filter bar */
  .filter-bar {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1rem 1.5rem;
    margin-bottom: 1.5rem;
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 12px; font-weight: 700; color: var(--text-2); letter-spacing: 0.04em; }
  .filter-bar label { font-size: 13px; color: var(--text-2); font-weight: 500; }
  .filter-bar input[type="date"] {
    font-size: 13px; padding: 6px 10px;
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius-md);
    background: var(--bg-2); color: var(--text);
    outline: none;
  }
  .filter-bar input[type="date"]:focus { border-color: var(--tiffany); box-shadow: 0 0 0 3px rgba(10,186,181,0.15); }

  /* Buttons */
  .btn {
    font-size: 13px; padding: 7px 16px;
    border: 0.5px solid var(--border-2);
    border-radius: var(--radius-md);
    background: var(--bg); color: var(--text-2);
    cursor: pointer; white-space: nowrap;
    font-weight: 500;
    transition: all 0.15s;
  }
  .btn:hover { background: var(--tiffany-bg); color: var(--tiffany-dkk); border-color: var(--tiffany); }
  .btn:active { transform: scale(0.98); }
  .btn-primary {
    background: var(--tiffany-dkk); color: #fff;
    border-color: var(--tiffany-dkk);
  }
  .btn-primary:hover { background: var(--tiffany-dk); color: #fff; border-color: var(--tiffany-dk); }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th {
    text-align: left; font-size: 11px; font-weight: 700; color: var(--text-2);
    text-transform: uppercase; letter-spacing: 0.06em; padding: 9px 12px;
    border-bottom: 1.5px solid var(--border-2);
    background: var(--bg-2);
  }
  th:first-child { border-radius: var(--radius-md) 0 0 0; }
  th:last-child { border-radius: 0 var(--radius-md) 0 0; }
  td {
    padding: 10px 12px; color: var(--text);
    border-bottom: 0.5px solid var(--border); vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--tiffany-bg); }

  .badge {
    display: inline-flex; align-items: center; padding: 3px 10px;
    border-radius: 999px; font-size: 11px; font-weight: 700; white-space: nowrap;
  }
  .badge-ok { background: var(--green-bg); color: var(--green-text); }
  .badge-ng { background: var(--red-bg); color: var(--red-text); }
  .truncate { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .empty { text-align: center; color: var(--text-muted); font-size: 13px; padding: 3rem 0; }

  /* Charts row */
  .charts-row {
    display: grid;
    grid-template-columns: 300px 1fr;
    gap: 16px;
    margin-bottom: 1.5rem;
  }
  @media (max-width: 700px) { .charts-row { grid-template-columns: 1fr; } }

  /* Pie legend */
  .pie-legend { display: flex; gap: 16px; margin-top: 14px; justify-content: center; }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-2); font-weight: 500; }
  .legend-dot { width: 10px; height: 10px; border-radius: 2px; }

  /* Person bars */
  .person-row { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
  .person-row:last-child { margin-bottom: 0; }
  .person-avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--tiffany-bg); color: var(--tiffany-dkk);
    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    border: 1.5px solid var(--border-2);
  }
  .person-info { flex: 1; min-width: 0; }
  .person-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; margin-bottom: 5px; gap: 6px; }
  .person-left { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .person-name-text { color: var(--text); font-weight: 700; font-size: 13px; }
  .person-stat { color: var(--text-2); white-space: nowrap; flex-shrink: 0; font-weight: 600; }
  .bar-bg { height: 8px; background: var(--bg-3); border-radius: 99px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 99px; transition: width 0.7s cubic-bezier(.4,0,.2,1); }

  /* Perf tags */
  .perf-tag {
    display: inline-flex; align-items: center; gap: 2px;
    padding: 2px 8px; border-radius: 999px;
    font-size: 11px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  }
  .perf-excellent { background: var(--green-bg); color: var(--green-text); }
  .perf-care { background: var(--red-bg); color: var(--red-text); }

  /* Monthly chart section */
  .monthly-section {
    margin-bottom: 1.5rem;
  }
  .person-select-row {
    display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center;
  }
  .person-tab {
    font-size: 12px; font-weight: 600; padding: 5px 14px;
    border: 1.5px solid var(--border-2); border-radius: 999px;
    background: var(--bg-2); color: var(--text-2);
    cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .person-tab:hover { background: var(--tiffany-bg); color: var(--tiffany-dkk); border-color: var(--tiffany); }
  .person-tab.active {
    background: var(--tiffany-dkk); color: #fff; border-color: var(--tiffany-dkk);
  }
  .person-tab-all {
    background: var(--bg-2); color: var(--text-2);
  }
  .person-tab-all.active {
    background: var(--tiffany-dkk); color: #fff; border-color: var(--tiffany-dkk);
  }

  /* Connect panel */
  .connect-panel {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-top: 1.5rem;
  }
  .connect-panel h2 {
    font-size: 11px; font-weight: 700; color: var(--text-3);
    margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em;
  }
  .source-display { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .source-url {
    flex: 1; min-width: 0; font-size: 12px; color: var(--text-2);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    padding: 7px 12px; background: var(--bg-2);
    border: 0.5px solid var(--border); border-radius: var(--radius-md);
    font-weight: 500;
  }
  .source-actions { display: flex; gap: 8px; flex-shrink: 0; }
  .connect-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .connect-row input {
    flex: 1; min-width: 240px; font-size: 13px; padding: 8px 12px;
    border: 0.5px solid var(--border-2); border-radius: var(--radius-md);
    background: var(--bg-2); color: var(--text); outline: none;
  }
  .connect-row input:focus { border-color: var(--tiffany); box-shadow: 0 0 0 3px rgba(10,186,181,0.15); }

  .status-bar {
    margin-top: 10px; font-size: 12px; color: var(--text-muted);
    min-height: 18px; display: flex; align-items: center; gap: 6px; font-weight: 500;
  }
  .status-bar.ok { color: var(--tiffany-dkk); }
  .status-bar.err { color: var(--red); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

  /* Toast */
  .toast-container {
    position: fixed; top: 68px; right: 1.5rem; z-index: 999;
    display: flex; flex-direction: column; gap: 8px; pointer-events: none;
  }
  .toast {
    background: var(--bg); border: 0.5px solid var(--border-2);
    border-radius: var(--radius-lg); padding: 12px 16px;
    font-size: 13px; color: var(--text); min-width: 210px;
    opacity: 0; transform: translateX(20px);
    transition: opacity 0.3s ease, transform 0.3s ease; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(0); }
  .toast.toast-care { border-left: 3px solid var(--red); }
  .toast.toast-excellent { border-left: 3px solid var(--tiffany); }
  .toast-name { font-weight: 700; margin-bottom: 2px; color: var(--text); }
  .toast-msg { color: var(--text-2); font-size: 12px; font-weight: 500; }

  .footer { text-align: center; font-size: 12px; color: var(--text-muted); padding: 2rem 0 1rem; font-weight: 500; }

  .section-gap { margin-bottom: 1.5rem; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">
    <div class="dot"></div>
    傳票目標管理
  </div>
  <div class="topbar-right" id="lastUpdate">尚未載入</div>
</div>

<div class="toast-container" id="toastContainer"></div>

<div class="main">

  <!-- Filter -->
  <div class="filter-bar">
    <span class="filter-label">目標日期篩選</span>
    <label>從</label>
    <input type="date" id="dateFrom">
    <label>到</label>
    <input type="date" id="dateTo">
    <button class="btn" onclick="applyFilter()">套用</button>
    <button class="btn" onclick="clearFilter()">清除</button>
    <span style="font-size:12px; color:var(--text-muted); margin-left:auto; font-weight:500;" id="filterInfo"></span>
  </div>

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric">
      <div class="val" id="m-total">—</div><div class="lbl">總目標數</div>
    </div>
    <div class="metric accent-green">
      <div class="val" id="m-done">—</div><div class="lbl">已達成</div>
    </div>
    <div class="metric accent-red">
      <div class="val" id="m-fail">—</div><div class="lbl">未達成</div>
    </div>
    <div class="metric accent-blue">
      <div class="val" id="m-rate">—</div><div class="lbl">整體達成率</div>
    </div>
    <div class="metric">
      <div class="val" id="m-persons">—</div><div class="lbl">負責人數</div>
    </div>
  </div>

  <!-- Table (moved above charts) -->
  <div class="card section-gap">
    <div style="display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:10px; margin-bottom:1rem;">
      <div class="card-title" style="margin-bottom:0;">目標明細</div>
      <div style="display:flex; gap:6px; flex-wrap:wrap; align-items:center;" id="tablePersonTabs"></div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:11%">目標日期</th>
            <th style="width:33%">目標項目</th>
            <th style="width:11%">負責人</th>
            <th style="width:11%; white-space:nowrap;">是否達成</th>
            <th style="width:34%">未達成說明</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="5" class="empty">尚無資料</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Charts row: pie + person bars -->
  <div class="charts-row">
    <div class="card">
      <div class="card-title">目標達成比例</div>
      <div style="position:relative; height:210px;">
        <canvas id="pieChart" role="img" aria-label="目標達成與未達成比例圓餅圖">目標達成比例圖</canvas>
        <div id="pieCenterText" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; pointer-events:none;">
          <div id="piePct" style="font-size:28px; font-weight:700; color:#065F5C; line-height:1;">—</div>
          <div style="font-size:11px; font-weight:600; color:#4A7A79; margin-top:3px; letter-spacing:0.04em;">達成率</div>
        </div>
      </div>
      <div class="pie-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#0ABAB5"></div>已達成</div>
        <div class="legend-item"><div class="legend-dot" style="background:#E05A5A"></div>未達成</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">各負責人達成率</div>
      <div id="personBars"><div class="empty">尚無資料</div></div>
    </div>
  </div>

  <!-- Monthly bar chart -->
  <div class="card section-gap monthly-section">
    <div class="card-title">各負責人每月達成率</div>
    <div class="person-select-row" id="personTabs"></div>
    <div style="position:relative;" id="monthlyChartWrap">
      <canvas id="monthlyChart" role="img" aria-label="各負責人每月達成率長條圖">每月達成率圖</canvas>
    </div>
  </div>

  <!-- Connect Panel -->
  <div class="connect-panel">
    <h2>資料來源</h2>
    <div class="source-display" id="sourceDisplay">
      <div class="source-url" id="sourceUrlText"></div>
      <div class="source-actions">
        <button class="btn btn-primary" onclick="refreshSheet()">更新</button>
        <button class="btn" onclick="toggleEdit()">變更來源</button>
      </div>
    </div>
    <div class="connect-row" id="editRow" style="display:none;">
      <input type="text" id="sheetUrl" placeholder="貼上新的 Google Sheets 網址...">
      <button class="btn btn-primary" onclick="saveAndLoad()">確認</button>
      <button class="btn" onclick="toggleEdit()">取消</button>
    </div>
    <div class="status-bar" id="status">
      <span class="status-dot"></span><span>載入中...</span>
    </div>
  </div>

  <div class="footer">傳票目標管理 · 資料來源：Google Sheets</div>
</div>

<script>
let allData = [];
let filtered = [];
let pieChartInstance = null;
let monthlyChartInstance = null;
let selectedPerson = '__ALL__';
let tablePersonFilter = '__ALL__';

const FIXED_URL = 'https://docs.google.com/spreadsheets/d/1xvOQnnqN5J-TITB4QTz-9KHwdbnE7t24ixeSp6MzSuY/edit?usp=sharing';
let currentUrl = FIXED_URL;

const C_TIFFANY   = '#0ABAB5';
const C_TIFFANY_DK = '#065F5C';
const C_RED       = '#E05A5A';
const C_TIFFANY_MID = '#088A86';

const PALETTE = ['#0ABAB5', '#F59E0B', '#6366F1', '#10B981', '#8B5CF6', '#F97316', '#0EA5E9'];

function toggleEdit() {
  const editRow = document.getElementById('editRow');
  const isHidden = editRow.style.display === 'none';
  editRow.style.display = isHidden ? 'flex' : 'none';
  if (isHidden) document.getElementById('sheetUrl').value = currentUrl;
}

function saveAndLoad() {
  const val = document.getElementById('sheetUrl').value.trim();
  if (!val) return;
  currentUrl = val;
  document.getElementById('sourceUrlText').textContent = currentUrl;
  document.getElementById('editRow').style.display = 'none';
  loadSheet(currentUrl);
}

async function refreshSheet() { loadSheet(currentUrl); }

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.className = 'status-bar' + (type ? ' ' + type : '');
  el.innerHTML = '<span class="status-dot"></span><span>' + msg + '</span>';
}

function isAchieved(r) {
  const v = (r.achieved || '').trim();
  return v === '是' || v === '已達成';
}

function parseDate(s) {
  if (!s) return null;
  return new Date(s.replace(/\//g, '-'));
}

function getYearMonth(s) {
  const d = parseDate(s);
  if (!d || isNaN(d)) return null;
  return d.getFullYear() + '/' + String(d.getMonth() + 1).padStart(2, '0');
}

async function loadSheet(raw) {
  if (!raw) raw = currentUrl;
  const m = raw.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (!m) { setStatus('無法解析試算表 ID', 'err'); return; }
  const id = m[1];
  const cleanUrl = raw.split('#')[0];
  const gidM = cleanUrl.match(/[?&]gid=(\d+)/);
  const gid = gidM ? gidM[1] : '0';
  const csvUrl = 'https://docs.google.com/spreadsheets/d/' + id + '/export?format=csv&id=' + id + '&gid=' + gid;
  setStatus('正在連線 Google Sheets...', '');
  try {
    const res = await fetch(csvUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    const rows = parseCSV(text);
    if (rows.length < 2) { setStatus('試算表資料為空或格式不符', 'err'); return; }
    const headers = rows[0].map(h => h.trim());
    const idx = kw => headers.findIndex(h => h.includes(kw));
    allData = rows.slice(1).filter(r => r.some(c => c.trim())).map(r => ({
      seq:      r[idx('項次')] || '',
      deadline: r[idx('目標日期')] || r[idx('日期')] || '',
      name:     r[idx('目標項目')] || r[idx('項目')] || '',
      reminder: r[idx('提醒')] || '',
      person:   r[idx('負責人')] || '',
      email:    r[idx('E-mail')] || r[idx('email')] || '',
      achieved: r[idx('是否達成')] || '',
      note:     r[idx('未達成')] || r[idx('說明')] || '',
    }));
    filtered = [...allData];
    setStatus('已從 Google Sheets 載入 ' + allData.length + ' 筆資料', 'ok');
    document.getElementById('lastUpdate').textContent = '已同步 · ' + new Date().toLocaleTimeString('zh-TW');
    render();
  } catch(e) {
    setStatus('載入失敗：' + e.message + '。請確認試算表已設為「知道連結者可檢視」', 'err');
  }
}

function parseCSV(text) {
  return text.split('\n').map(line => {
    const cells = []; let cur = ''; let inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cells.push(cur); cur = ''; }
      else { cur += c; }
    }
    cells.push(cur);
    return cells.map(c => c.trim().replace(/^"|"$/g, ''));
  });
}

function applyFilter() {
  const from = document.getElementById('dateFrom').value;
  const to = document.getElementById('dateTo').value;
  filtered = allData.filter(r => {
    const d = parseDate(r.deadline);
    if (!d) return true;
    if (from && d < new Date(from)) return false;
    if (to && d > new Date(to)) return false;
    return true;
  });
  document.getElementById('filterInfo').textContent = (from || to) ? ('篩選後 ' + filtered.length + ' 筆') : '';
  render();
}

function clearFilter() {
  document.getElementById('dateFrom').value = '';
  document.getElementById('dateTo').value = '';
  document.getElementById('filterInfo').textContent = '';
  filtered = [...allData];
  render();
}

function render() {
  const total = filtered.length;
  const done = filtered.filter(r => isAchieved(r)).length;
  const fail = total - done;
  const rate = total > 0 ? Math.round(done / total * 100) : 0;
  const persons = [...new Set(filtered.map(r => r.person).filter(Boolean))];

  document.getElementById('m-total').textContent = total;
  document.getElementById('m-done').textContent = done;
  document.getElementById('m-fail').textContent = fail;
  document.getElementById('m-rate').textContent = rate + '%';
  document.getElementById('m-persons').textContent = persons.length;

  renderTablePersonTabs(persons);
  renderTable();
  renderPie(done, fail);
  renderPersonBars(persons);
  renderPersonTabs(persons);
  renderMonthlyChart();
  showToasts(persons);
}

function renderPie(done, fail) {
  const total = done + fail;
  const rate = total > 0 ? Math.round(done / total * 100) : 0;
  document.getElementById('piePct').textContent = rate + '%';
  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChartInstance) pieChartInstance.destroy();
  pieChartInstance = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: ['已達成', '未達成'],
      datasets: [{ data: [done, fail], backgroundColor: [C_TIFFANY, C_RED], borderWidth: 0 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '68%',
      plugins: {
        legend: { display: false },
        tooltip: { callbacks: { label: ctx => ' ' + ctx.label + '：' + ctx.raw + ' 筆' } }
      }
    }
  });
}

function getBarColor(pct) {
  if (pct === 100) return C_TIFFANY;
  if (pct < 75) return C_RED;
  return C_TIFFANY_MID;
}

function getPerfTag(pct) {
  if (pct === 100) return '<span class="perf-tag perf-excellent">👍 很優秀</span>';
  if (pct < 75)   return '<span class="perf-tag perf-care">😣 須關愛</span>';
  return '';
}

function renderPersonBars(persons) {
  const container = document.getElementById('personBars');
  if (!persons.length) { container.innerHTML = '<div class="empty">尚無資料</div>'; return; }
  container.innerHTML = persons.map(p => {
    const rows = filtered.filter(r => r.person === p);
    const pDone = rows.filter(r => isAchieved(r)).length;
    const pct = rows.length > 0 ? Math.round(pDone / rows.length * 100) : 0;
    return `<div class="person-row">
      <div class="person-avatar">${p.charAt(0)}</div>
      <div class="person-info">
        <div class="person-meta">
          <div class="person-left">
            <span class="person-name-text">${p}</span>
            ${getPerfTag(pct)}
          </div>
          <span class="person-stat">${pDone}/${rows.length} &nbsp;${pct}%</span>
        </div>
        <div class="bar-bg">
          <div class="bar-fill" style="width:${pct}%; background:${getBarColor(pct)};"></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Monthly chart ── */
function renderPersonTabs(persons) {
  const wrap = document.getElementById('personTabs');
  const allPersons = [...new Set(allData.map(r => r.person).filter(Boolean))];
  wrap.innerHTML = `<button class="person-tab person-tab-all ${selectedPerson === '__ALL__' ? 'active' : ''}" onclick="selectPerson('__ALL__')">全部</button>` +
    allPersons.map((p, i) =>
      `<button class="person-tab ${selectedPerson === p ? 'active' : ''}" onclick="selectPerson('${p}')">${p}</button>`
    ).join('');
}

function selectPerson(p) {
  selectedPerson = p;
  const allPersons = [...new Set(allData.map(r => r.person).filter(Boolean))];
  renderPersonTabs(allPersons);
  renderMonthlyChart();
}

function renderMonthlyChart() {
  const allPersons = [...new Set(allData.map(r => r.person).filter(Boolean))];
  const months = [...new Set(filtered.map(r => getYearMonth(r.deadline)).filter(Boolean))].sort();

  const wrap = document.getElementById('monthlyChartWrap');
  const barCount = months.length * (selectedPerson === '__ALL__' ? allPersons.length : 1);
  const h = Math.max(260, barCount * 22 + 80);
  wrap.style.height = h + 'px';

  const ctx = document.getElementById('monthlyChart').getContext('2d');
  if (monthlyChartInstance) monthlyChartInstance.destroy();

  let datasets;
  if (selectedPerson === '__ALL__') {
    datasets = allPersons.map((p, i) => {
      const data = months.map(mo => {
        const rows = filtered.filter(r => r.person === p && getYearMonth(r.deadline) === mo);
        if (!rows.length) return null;
        return Math.round(rows.filter(r => isAchieved(r)).length / rows.length * 100);
      });
      return {
        label: p,
        data,
        backgroundColor: PALETTE[i % PALETTE.length] + 'CC',
        borderColor: PALETTE[i % PALETTE.length],
        borderWidth: 1.5,
        borderRadius: 4,
      };
    });
  } else {
    const data = months.map(mo => {
      const rows = filtered.filter(r => r.person === selectedPerson && getYearMonth(r.deadline) === mo);
      if (!rows.length) return null;
      return Math.round(rows.filter(r => isAchieved(r)).length / rows.length * 100);
    });
    datasets = [{
      label: selectedPerson,
      data,
      backgroundColor: months.map((_, i) => {
        const v = data[i];
        if (v === null) return 'transparent';
        if (v === 100) return C_TIFFANY + 'CC';
        if (v < 75) return C_RED + 'CC';
        return C_TIFFANY_MID + 'CC';
      }),
      borderColor: months.map((_, i) => {
        const v = data[i];
        if (v === null) return 'transparent';
        if (v === 100) return C_TIFFANY;
        if (v < 75) return C_RED;
        return C_TIFFANY_MID;
      }),
      borderWidth: 1.5,
      borderRadius: 4,
    }];
  }

  monthlyChartInstance = new Chart(ctx, {
    type: 'bar',
    data: { labels: months, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      indexAxis: 'y',
      scales: {
        x: {
          min: 0, max: 100,
          ticks: {
            callback: v => v + '%',
            color: '#2E5554',
            font: { size: 11, weight: '600' },
            stepSize: 25,
          },
          grid: { color: 'rgba(10,186,181,0.1)' },
        },
        y: {
          ticks: { color: '#2E5554', font: { size: 11, weight: '600' } },
          grid: { display: false },
        }
      },
      plugins: {
        legend: {
          display: selectedPerson === '__ALL__',
          position: 'top',
          labels: { color: '#1A3332', font: { size: 11, weight: '600' }, boxWidth: 12, padding: 16 }
        },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + ctx.dataset.label + '：' + (ctx.raw !== null ? ctx.raw + '%' : '無資料')
          }
        }
      }
    }
  });
}

function showToasts(persons) {
  const container = document.getElementById('toastContainer');
  container.innerHTML = '';
  const queue = [];
  persons.forEach(p => {
    const rows = filtered.filter(r => r.person === p);
    const done = rows.filter(r => isAchieved(r)).length;
    const pct = rows.length > 0 ? Math.round(done / rows.length * 100) : 0;
    if (pct === 100) queue.push({ person: p, pct, type: 'excellent', msg: '👍 很優秀' });
    else if (pct < 75) queue.push({ person: p, pct, type: 'care', msg: '😣 須關愛' });
  });
  if (!queue.length) return;
  let i = 0;
  function next() {
    if (i >= queue.length) return;
    const t = queue[i++];
    const el = document.createElement('div');
    el.className = 'toast toast-' + t.type;
    el.innerHTML = '<div class="toast-name">' + t.person + '　' + t.pct + '%</div><div class="toast-msg">' + t.msg + '</div>';
    container.appendChild(el);
    requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('show')));
    setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 350); }, 3800);
    setTimeout(next, 450);
  }
  next();
}

function renderTablePersonTabs(persons) {
  const wrap = document.getElementById('tablePersonTabs');
  if (!wrap) return;
  wrap.innerHTML =
    `<button class="person-tab person-tab-all ${tablePersonFilter === '__ALL__' ? 'active' : ''}" onclick="selectTablePerson('__ALL__')">全部</button>` +
    persons.map(p =>
      `<button class="person-tab ${tablePersonFilter === p ? 'active' : ''}" onclick="selectTablePerson('${p}')">${p}</button>`
    ).join('');
}

function selectTablePerson(p) {
  tablePersonFilter = p;
  const persons = [...new Set(filtered.map(r => r.person).filter(Boolean))];
  renderTablePersonTabs(persons);
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  const rows = tablePersonFilter === '__ALL__'
    ? filtered
    : filtered.filter(r => r.person === tablePersonFilter);
  if (!rows.length) { tbody.innerHTML = '<tr><td colspan="5" class="empty">沒有符合條件的資料</td></tr>'; return; }
  tbody.innerHTML = rows.map(r => {
    const ok = isAchieved(r);
    return `<tr>
      <td style="font-weight:600;">${r.deadline || '—'}</td>
      <td class="truncate" title="${r.name}">${r.name || '—'}</td>
      <td style="font-weight:600;">${r.person || '—'}</td>
      <td><span class="badge ${ok ? 'badge-ok' : 'badge-ng'}">${r.achieved || '—'}</span></td>
      <td class="truncate" title="${r.note}" style="color:var(--text-2); font-size:12px;">${r.note || '—'}</td>
    </tr>`;
  }).join('');
}

document.getElementById('sourceUrlText').textContent = currentUrl;
loadSheet(currentUrl);
</script>
